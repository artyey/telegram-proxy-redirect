<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTProto Proxy Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0b1120; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; padding: 24px 12px; }
        .container { max-width: 680px; width: 100%; background: rgba(15,23,42,0.95); backdrop-filter: blur(12px); border-radius: 24px; padding: 20px; border: 1px solid #1e293b; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid #1e293b; margin-bottom: 16px; }
        .version { font-size: 0.8rem; color: #64748b; }
        .stats { font-size: 0.75rem; color: #64748b; }
        h1 { font-size: 1.4rem; font-weight: 600; text-align: center; margin: 8px 0 4px; }
        .sub { text-align: center; font-size: 0.8rem; color: #64748b; margin-bottom: 16px; }
        
        .proxy-card { background: #111827; border-radius: 14px; padding: 10px 12px; margin-bottom: 8px; display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; border: 2px solid transparent; transition: 0.25s; position: relative; overflow: hidden; }
        .proxy-card.active { border-color: #facc15; box-shadow: 0 0 12px rgba(250,204,21,0.2); animation: glow 2.5s infinite alternate; }
        @keyframes glow { 0% { box-shadow: 0 0 12px rgba(250,204,21,0.2); } 100% { box-shadow: 0 0 20px rgba(250,204,21,0.35); } }
        .proxy-card.active::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #facc15, transparent); animation: shimmer 3s infinite linear; }
        @keyframes shimmer { to { transform: translateX(200%); } }
        .proxy-card.used { filter: grayscale(0.85); opacity: 0.7; border-color: #334155; animation: none !important; }
        .proxy-card.used::after { content: '✓'; position: absolute; top: 6px; right: 10px; color: #22c55e; font-weight: bold; }
        
        .flag { font-size: 1.6rem; }
        .info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .host { font-weight: 500; color: #f1f5f9; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { display: flex; gap: 6px; align-items: center; font-size: 0.7rem; color: #94a3b8; }
        .type-badge { background: #3b82f620; color: #60a5fa; padding: 2px 5px; border-radius: 4px; font-weight: 500; }
        .ping-badge { padding: 2px 5px; border-radius: 4px; font-weight: 500; }
        .ping-good { background: #22c55e20; color: #4ade80; }
        .ping-mid { background: #eab30820; color: #facc15; }
        .ping-pending { background: #64748b20; color: #94a3b8; }
        
        .btn { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 0.85rem; transition: 0.15s; box-shadow: 0 2px 6px rgba(14,165,233,0.3); }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .proxy-card.used .btn { background: #475569; box-shadow: none; opacity: 0.8; }
        
        .footer { text-align: center; margin-top: 14px; font-size: 0.75rem; color: #64748b; }
        .loader { text-align: center; padding: 30px; color: #94a3b8; }
        .spinner { width: 24px; height: 24px; border: 3px solid #1e293b; border-top-color: #0ea5e9; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 🔔 Уведомления */
        .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; background: linear-gradient(135deg, #10b981, #059669); color: #fff; padding: 12px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 500; box-shadow: 0 4px 12px rgba(16,185,129,0.4); transform: translateX(120%); opacity: 0; transition: 0.4s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; gap: 10px; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.hide { transform: translateX(120%); opacity: 0; }
        .toast button { background: none; border: none; color: rgba(255,255,255,0.8); cursor: pointer; font-size: 1.1rem; padding: 0; }
        .toast button:hover { color: #fff; }
        @media (max-width: 500px) { .proxy-card { grid-template-columns: 1fr; } .btn { width: 100%; } .toast { left: 10px; right: 10px; justify-content: space-between; } }
    </style>
</head>
<body>
<div class="container" id="app"><div class="loader"><div class="spinner"></div>Загрузка...</div></div>

<script>
    const CONFIG = {
        WORKER_URL: "https://tg-proxy-fetcher.nevien19.workers.dev", // ← ВСТАВЬТЕ ССЫЛКУ
        REFRESH_MS: 600000, // 10 минут
        PING_INTERVAL: 10000,
        MAX_PROXIES: 12,
        TIMER_KEY: "tg_tmr_v220",
        USED_KEY: "tg_used_v220",
        SEEN_KEY: "tg_seen_v220"
    };

    let state = { proxies: [], timer: null, pingTimer: null };

    // ⏱️ Таймер (НИКАК не сбрасывается, сохраняется в localStorage)
    const getTarget = () => parseInt(localStorage.getItem(CONFIG.TIMER_KEY)) || Date.now() + CONFIG.REFRESH_MS;
    const setTarget = (t) => localStorage.setItem(CONFIG.TIMER_KEY, String(t));

    // 💾 Использованные
    const getUsed = () => new Set(JSON.parse(localStorage.getItem(CONFIG.USED_KEY) || "[]"));
    const markUsed = (k) => { const s = getUsed(); s.add(k); localStorage.setItem(CONFIG.USED_KEY, JSON.stringify([...s])); };
    const isUsed = (k) => getUsed().has(k);

    // 🔔 Уведомление
    const notify = (msg) => {
        const t = document.createElement("div");
        t.className = "toast";
        t.innerHTML = `<span>✨ ${msg}</span><button onclick="this.parentElement.classList.add('hide'); setTimeout(()=>this.parentElement.remove(), 500)">✕</button>`;
        document.body.appendChild(t);
        requestAnimationFrame(() => t.classList.add("show"));
        setTimeout(() => { t.classList.add("hide"); setTimeout(() => t.remove(), 500); }, 12000);
    };

    // 🌐 Проверка доступности (реалистичный пинг для браузера)
    const checkPing = async (server, port) => {
        const start = performance.now();
        try {
            // Пробуем открыть порт с таймаутом 1с
            await fetch(`https://${server}:${port}/`, { mode: "no-cors", signal: AbortSignal.timeout(1000) });
            const ms = Math.round(performance.now() - start);
            return ms < 1000 ? ms : null;
        } catch { return null; }
    };

    // 📥 Загрузка и обновление
    const updateProxies = async () => {
        try {
            const res = await fetch(CONFIG.WORKER_URL, { cache: "no-store" });
            const data = await res.json();
            if (!data.success || !data.proxies?.length) return;

            const raw = data.proxies.filter(p => p.server && p.server !== "Unknown" && p.port && p.secret);
            const oldKeys = new Set(state.proxies.map(p => `${p.server}:${p.port}`));
            const newValid = raw.slice(0, CONFIG.MAX_PROXIES);
            
            // Проверка на новые
            const added = newValid.filter(p => !oldKeys.has(`${p.server}:${p.port}`));
            if (added.length > 0) notify(`Найдено ${added.length} новых прокси!`);
            
            state.proxies = newValid.map(p => ({ ...p, key: `${p.server}:${p.port}`, used: isUsed(`${p.server}:${p.port}`) }));
            render();
        } catch (e) { console.warn("Fetch error:", e); }
        
        setTarget(Date.now() + CONFIG.REFRESH_MS);
        startCountdown();
    };

    // ⏳ Обратный отсчёт
    const startCountdown = () => {
        clearInterval(state.timer);
        const target = getTarget();
        const el = document.getElementById("countdown");
        if (!el) return;
        
        const tick = () => {
            const diff = target - Date.now();
            el.textContent = diff <= 0 ? "00:00" : `${Math.floor(diff/60000).toString().padStart(2,'0')}:${Math.floor((diff%60000)/1000).toString().padStart(2,'0')}`;
            if (diff <= 0) { clearInterval(state.timer); updateProxies(); }
        };
        tick();
        state.timer = setInterval(tick, 1000);
    };

    // 🔄 Пинг-луп
    const runPingLoop = () => {
        clearInterval(state.pingTimer);
        const loop = async () => {
            for (const p of state.proxies) {
                const el = document.getElementById(`ping-${p.key}`);
                if (!el) continue;
                const ms = await checkPing(p.server, p.port);
                el.className = `ping-badge ${ms === null ? 'ping-good' : ms < 150 ? 'ping-good' : 'ping-mid'}`;
                el.textContent = ms === null ? "🟢 Доступен" : `~${ms}ms`;
                await new Promise(r => setTimeout(r, 120));
            }
        };
        loop();
        state.pingTimer = setInterval(loop, CONFIG.PING_INTERVAL);
    };

    // 🎨 Рендер
    const render = () => {
        // Сортировка: активные сверху, использованные снизу
        const sorted = [...state.proxies].sort((a,b) => a.used - b.used).slice(0, CONFIG.MAX_PROXIES);
        
        let html = `
            <div class="header">
                <div class="version">v2.2.0</div>
                <div class="stats">📡 ${sorted.length} серверов</div>
            </div>
            <h1>MTProto для Telegram</h1>
            <div class="sub">Источник: @ProxyFree_Ru • Автообновление 10 мин</div>
        `;
        sorted.forEach(p => {
            html += `
                <div class="proxy-card ${p.used ? 'used' : 'active'}" data-key="${p.key}">
                    <div class="flag">${p.flag || '🌐'}</div>
                    <div class="info">
                        <div class="host" title="${p.key}">${p.server}</div>
                        <div class="meta"><span class="type-badge">${p.type}</span><span class="ping-badge ping-pending" id="ping-${p.key}">🔄</span></div>
                    </div>
                    <button class="btn" onclick="connectProxy('${p.raw}')">Подключить</button>
                </div>`;
        });
        html += `<div class="footer">Обновление через: <span id="countdown">--:--</span></div>`;
        document.getElementById("app").innerHTML = html;
        runPingLoop();
    };

    window.connectProxy = (raw) => {
        const m = raw.match(/server=([^&]+)&port=(\d+)/);
        if (m) { markUsed(`${m[1]}:${m[2]}`); render(); }
        location.href = raw;
    };

    // 🚀 Старт
    document.addEventListener("DOMContentLoaded", () => {
        updateProxies();
    });
</script>
</body>
</html>
